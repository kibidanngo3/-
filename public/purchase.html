<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>発注履歴</title>
    <link rel="stylesheet" href="admin.css">
</head>

<body>

<div class="container">

    <div class="header">

        <h1>🛒 発注履歴</h1>

        <div>
            <a href="cart.html">
                <button class="action-btn">
                    🛒 カートを見る（<span id="cartCount">0</span>）
                </button>
            </a>

            <a href="dashboard.html">
                <button class="action-btn">
                    ← ダッシュボードへ戻る
                </button>
            </a>
        </div>

    </div>

    <div class="form-box">

<h2>カートに追加</h2>

<select id="purchaseProductCode">
    <option value="">商品を選択</option>
</select>

<input
    type="number"
    id="purchaseQuantity"
    placeholder="数量"
>

<button
    class="action-btn"
    onclick="addPurchaseToCart()">
    カートに追加
</button>

<p style="color:#666; font-size:0.9em;">金額は過去の仕入実績（仕入金額 ÷ 仕入数量の平均単価）× 数量で自動計算されます。仕入実績がない商品は空欄になります</p>

</div>


    <h2 style="margin-top:40px;">発注一覧</h2>


    <table>

        <thead>

            <tr>
                <th>発注ID</th>
                <th>日付</th>
                <th>商品名</th>
                <th>数量</th>
                <th>金額</th>
            </tr>

        </thead>


        <tbody id="purchaseTableBody">

        </tbody>


    </table>


</div>


<script src="admin.js"></script>

</body>
</html>
