<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI分析</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🤖 AI分析・推奨発注</h1>

        <a href="dashboard.html">
            <button class="action-btn">← ダッシュボードへ戻る</button>
        </a>
    </div>

    <div class="card-container">

        <div class="card">
            <h2 id="analyticsNeedCount">-</h2>
            <p>要発注商品</p>
        </div>

        <div class="card">
            <h2 id="analyticsTotalQty">-</h2>
            <p>次回推奨発注数</p>
        </div>

        <div class="card">
            <h2>RF</h2>
            <p>Random Forest</p>
        </div>

    </div>

    <p id="analyticsNote" style="color:#666; margin-top:12px;"></p>

    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:40px;">
        <h2 style="margin:0;">次回のAI推奨発注一覧</h2>
        <button class="action-btn" onclick="addRecommendationsToCart()">🛒 推奨商品をカートに追加</button>
    </div>

    <p style="color:#666;">カートに追加後、<a href="cart.html">カートページ</a>で内容を確認・追加編集し、「入荷する」を押すと発注記録と在庫反映がまとめて行われます。</p>

    <table>

        <thead>
            <tr>
                <th>商品名</th>
                <th>現在庫</th>
                <th>前回消費量</th>
                <th>予測消費量</th>
                <th>次回推奨発注数</th>
                <th>次回発注日</th>
                <th>判定</th>
            </tr>
        </thead>

        <tbody id="analyticsTableBody">

            <tr>
                <td colspan="7">読み込み中...</td>
            </tr>

        </tbody>

    </table>

</div>

<script src="admin.js"></script>

</body>
</html>
