<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>購買部 在庫管理システム（確認用）</title>
<style>
  :root {
    color-scheme: light dark;
    --border: #d9dee3;
    --muted: #6b7280;
    --accent: #2563eb;
    --danger: #dc2626;
    --bg-card: #ffffff;
    --bg-page: #f3f4f6;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --border: #3a3f47;
      --muted: #9aa1ab;
      --bg-card: #1f2328;
      --bg-page: #14171a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
    background: var(--bg-page);
    color: inherit;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 4px; font-size: 1.3rem; }
  header p { margin: 0; color: var(--muted); font-size: 0.85rem; }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    gap: 20px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card h2 { margin: 0 0 12px; font-size: 1rem; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  select, input, button {
    font: inherit;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: inherit;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; }
  .stock-low { color: var(--danger); font-weight: 600; }
  .table-wrap { overflow-x: auto; max-height: 480px; overflow-y: auto; }
  form.inline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .msg { font-size: 0.8rem; margin-top: 8px; }
  .msg.ok { color: #16a34a; }
  .msg.err { color: var(--danger); }
  .muted { color: var(--muted); font-size: 0.8rem; }
  .stock-input { width: 70px; }
  .stock-input.dirty { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, var(--bg-card)); }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 8px;
    border-radius: 999px;
    background: var(--muted);
    color: white;
    margin-left: 6px;
  }
</style>
</head>
<body>
<header>
  <h1>購買部 在庫管理システム（確認用UI）</h1>
  <p>src/routes 経由でDynamoDBのデータを直接確認するための簡易画面です。本番のUIはフロント担当が別途作成します。</p>
</header>

<main>
  <section class="card">
    <h2>商品一覧・在庫入力<span class="badge">毎日</span></h2>
    <p class="muted">「在庫入力」欄に今日の在庫数を打ち込み、Enterキーで次の商品欄に移動できます。入力し終えたら一番下の「まとめて記録する」を押してください（未入力の行は記録されません）。</p>
    <div class="toolbar">
      <label>ジャンル絞り込み:
        <select id="genreFilter"><option value="">すべて</option></select>
      </label>
      <label>記録日:
        <input type="date" id="bulkStockDate">
      </label>
      <button id="reloadBtn" type="button">再読み込み</button>
      <span class="muted" id="productCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>コード</th><th>商品名</th><th>ジャンル</th><th>温度帯</th>
            <th>容器/容量</th><th>現行売値</th><th>前回在庫</th><th>最終記録日</th><th>在庫入力（今日）</th>
          </tr>
        </thead>
        <tbody id="productRows"></tbody>
      </table>
    </div>
    <div class="toolbar" style="margin-top:12px; margin-bottom:0;">
      <button id="bulkSaveBtn" type="button">まとめて記録する</button>
      <span class="muted" id="bulkDirtyCount"></span>
    </div>
    <p class="msg" id="bulkStockMsg"></p>
  </section>

  <section class="card">
    <h2>AI推奨発注数（要購買のみ）</h2>
    <p class="muted" id="recoNote"></p>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>コード</th><th>商品名</th><th>現在庫</th><th>前サイクル消費量</th>
            <th>予測消費量</th><th>推奨購買数量</th>
          </tr>
        </thead>
        <tbody id="recoRows"></tbody>
      </table>
    </div>
  </section>

  <section class="card">
    <h2>仕入れを記録する<span class="badge">2週間に1回</span></h2>
    <form class="inline" id="purchaseForm">
      <select id="purchaseProduct" required></select>
      <input type="date" id="purchaseDate" required>
      <input type="number" id="purchaseQty" placeholder="数量" min="1" required style="width:90px">
      <input type="number" id="purchaseAmount" placeholder="金額（任意）" min="0" style="width:110px">
      <button type="submit">記録する</button>
    </form>
    <p class="msg" id="purchaseMsg"></p>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const today = () => new Date().toISOString().slice(0, 10);

let products = [];

async function loadGenres() {
  const genres = await (await fetch('/api/genres')).json();
  const filter = $('genreFilter');
  filter.innerHTML = '<option value="">すべて</option>' +
    genres.map((g) => `<option value="${g.genre_id}">${g.genre_name}</option>`).join('');
}

function updateDirtyCount() {
  const n = document.querySelectorAll('.stock-input.dirty').length;
  $('bulkDirtyCount').textContent = n > 0 ? `${n} 件 入力済み` : '';
}

function focusNextStockInput(current) {
  const inputs = Array.from(document.querySelectorAll('.stock-input'));
  const idx = inputs.indexOf(current);
  if (idx >= 0 && idx < inputs.length - 1) {
    inputs[idx + 1].focus();
    inputs[idx + 1].select();
  }
}

async function loadProducts() {
  const genreId = $('genreFilter').value;
  const url = genreId ? `/api/products?genre_id=${genreId}` : '/api/products';
  products = await (await fetch(url)).json();

  $('productCount').textContent = `${products.length} 件`;
  $('productRows').innerHTML = products.map((p) => {
    const lowStock = p.current_stock != null && p.current_stock <= 5;
    const containerInfo = [p.container, p.volume_ml ? p.volume_ml + 'ml' : null].filter(Boolean).join(' ');
    return `<tr>
      <td>${p.product_code}</td>
      <td>${p.product_name}</td>
      <td>${p.genre_name ?? ''}</td>
      <td>${p.temp_zone ?? ''}</td>
      <td>${containerInfo}</td>
      <td>${p.current_price != null ? '¥' + p.current_price : '-'}</td>
      <td class="${lowStock ? 'stock-low' : ''}">${p.current_stock ?? '-'}</td>
      <td>${p.stock_recorded_at ?? '-'}</td>
      <td><input type="number" class="stock-input" min="0" data-code="${p.product_code}" placeholder="${p.current_stock ?? ''}"></td>
    </tr>`;
  }).join('');

  document.querySelectorAll('.stock-input').forEach((input) => {
    input.addEventListener('input', () => {
      input.classList.toggle('dirty', input.value !== '');
      updateDirtyCount();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        focusNextStockInput(input);
      }
    });
  });
  updateDirtyCount();

  const options = products
    .map((p) => `<option value="${p.product_code}">${p.product_code}: ${p.product_name}</option>`)
    .join('');
  $('purchaseProduct').innerHTML = options;
}

async function loadRecommendations() {
  const recos = await (await fetch('/api/recommendations')).json();
  const nameOf = (code) => products.find((p) => p.product_code === code)?.product_name ?? `商品#${code}`;
  const needBuy = recos.filter((r) => r.purchase_needed);

  const note = $('recoNote');
  if (recos.length === 0) {
    note.textContent = 'まだAIの算出結果がありません（ai/purchase_prediction.py を実行するとここに反映されます）';
  } else {
    const generatedAt = new Date(recos[0].generated_at).toLocaleString('ja-JP');
    note.textContent = `算出日時: ${generatedAt} ／ 要購買 ${needBuy.length}品目`
      + '　※現時点は在庫の日次記録が本番でまだ蓄積されていないため、AI班のサンプルデータに基づく参考値です';
  }

  $('recoRows').innerHTML = needBuy.map((r) => `<tr>
    <td>${r.product_code}</td>
    <td>${nameOf(r.product_code)}</td>
    <td>${r.current_stock ?? '-'}</td>
    <td>${r.last_cycle_consumption ?? '-'}</td>
    <td>${r.predicted_consumption ?? '-'}</td>
    <td><strong>${r.recommended_qty}</strong></td>
  </tr>`).join('');
}

async function refreshAll() {
  await loadGenres();
  await loadProducts();
  await loadRecommendations();
}

$('reloadBtn').addEventListener('click', loadProducts);
$('genreFilter').addEventListener('change', loadProducts);

$('bulkSaveBtn').addEventListener('click', async () => {
  const msg = $('bulkStockMsg');
  const recordDate = $('bulkStockDate').value;
  const dirtyInputs = Array.from(document.querySelectorAll('.stock-input.dirty'));

  if (!recordDate) {
    msg.textContent = '記録日を指定してください';
    msg.className = 'msg err';
    return;
  }
  if (dirtyInputs.length === 0) {
    msg.textContent = '入力された在庫数がありません';
    msg.className = 'msg err';
    return;
  }

  msg.textContent = `送信中... (${dirtyInputs.length}件)`;
  msg.className = 'msg';

  const results = await Promise.allSettled(dirtyInputs.map((input) =>
    fetch('/api/stock-records', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product_code: Number(input.dataset.code),
        record_date: recordDate,
        stock_count: Number(input.value),
      }),
    }).then((res) => { if (!res.ok) throw new Error(`商品#${input.dataset.code}`); })
  ));

  const failed = results.filter((r) => r.status === 'rejected');
  if (failed.length === 0) {
    msg.textContent = `${dirtyInputs.length}件 記録しました`;
    msg.className = 'msg ok';
  } else {
    msg.textContent = `${dirtyInputs.length - failed.length}件成功 / ${failed.length}件失敗`;
    msg.className = 'msg err';
  }
  await loadProducts();
});

$('purchaseForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = $('purchaseMsg');
  msg.textContent = '送信中...';
  msg.className = 'msg';
  try {
    const amount = $('purchaseAmount').value;
    const res = await fetch('/api/purchases', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        product_code: Number($('purchaseProduct').value),
        purchase_date: $('purchaseDate').value,
        quantity: Number($('purchaseQty').value),
        amount: amount ? Number(amount) : null,
      }),
    });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    msg.textContent = '記録しました';
    msg.className = 'msg ok';
  } catch (err) {
    msg.textContent = 'エラー: ' + err.message;
    msg.className = 'msg err';
  }
});

$('bulkStockDate').value = today();
$('purchaseDate').value = today();
refreshAll();
</script>
</body>
</html>
