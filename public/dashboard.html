<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>研究室購買部 管理システム</title>

    <link rel="stylesheet" href="admin.css">
</head>


<body>


<div class="container">


    <!-- ヘッダー -->

    <div class="header">

        <div>
            <h1>📦 研究室購買部</h1>
            <p>管理ダッシュボード</p>
        </div>

    </div>



    <!-- 管理メニュー -->

    <h2 class="section-title">
        管理メニュー
    </h2>


    <div class="menu">


        <a href="products.html">
            <button>
                📦<br>
                商品管理
            </button>
        </a>


        <a href="inventory.html">
            <button>
                📋<br>
                在庫管理
            </button>
        </a>


        <a href="purchase.html">
            <button>
                🛒<br>
                発注履歴
            </button>
        </a>


        <a href="price.html">
            <button>
                💰<br>
                価格管理
            </button>
        </a>


        <a href="analytics.html">
            <button>
                🤖<br>
                AI分析
            </button>
        </a>


    </div>




    <!-- 状況カード -->


    <h2 class="section-title">
        現在の状況
    </h2>


    <div class="card-container">


        <div class="card">

            <h2>
                📦 <span id="productCount">-</span>
            </h2>

            <p>
                登録商品数
            </p>

        </div>



        <div class="card">

            <h2>
                ⚠️ <span id="lowStockCount">-</span>
            </h2>

            <p>
                在庫不足商品
            </p>

        </div>



        <div class="card">

            <h2>
                🛒 <span id="recommendCount">-</span>
            </h2>

            <p>
                要発注商品
            </p>

        </div>



        <div class="card">

            <h2>
                📈 <span id="recommendTotal">-</span>
            </h2>

            <p>
                次回推奨発注数
            </p>

        </div>


    </div>





    <!-- AI推奨 -->


    <h2 class="section-title">
        🤖 次回のAI推奨発注
    </h2>


    <table id="recommendTable">


        <thead>

            <tr>

                <th>
                    商品コード
                </th>

                <th>
                    現在庫
                </th>

                <th>
                    予測消費
                </th>

                <th>
                    次回推奨発注数
                </th>

                <th>
                    次回発注日
                </th>

            </tr>

        </thead>



        <tbody>


            <tr>

                <td colspan="5">
                    AI予測API実装後に表示されます
                </td>


            </tr>


        </tbody>


    </table>


</div>



<script src="admin.js"></script>


</body>

</html>
